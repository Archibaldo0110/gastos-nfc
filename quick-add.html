<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gasto Rápido</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #0f0f12;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  #app {
    position: relative;
    width: 100%;
    height: 100vh;
    max-height: 480px;
    max-width: 340px;
    margin: 0 auto;
    overflow: hidden;
    background: #1a1a1f;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .panel {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px;
    transition: transform 320ms cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  #panelMonto { transform: translateY(0%); }
  #panelCategoria { transform: translateY(100%); }
  #app.showCategoria #panelMonto { transform: translateY(-100%); }
  #app.showCategoria #panelCategoria { transform: translateY(0%); }

  .label { color: #888; font-size: 14px; margin-bottom: 8px; letter-spacing: 0.5px; }
  #montoInput {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 56px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 24px;
  }
  #montoInput::placeholder { color: #444; }

  .btn-primary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: #4f7cff;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary:active { background: #3a63e0; }
  .btn-primary:disabled { background: #333; color: #666; }

  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
  }
  .cat-btn {
    padding: 20px 10px;
    border: none;
    border-radius: 14px;
    background: #26262e;
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
  }
  .cat-btn:active { background: #4f7cff; }

  #backBtn {
    position: absolute;
    top: 16px; left: 16px;
    background: none;
    border: none;
    color: #666;
    font-size: 20px;
    cursor: pointer;
  }

  #toast {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2ecc71;
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    opacity: 0;
    transition: all 250ms ease;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="app">
  <div id="panelMonto" class="panel">
    <div class="label">MONTO DEL GASTO</div>
    <input id="montoInput" type="number" inputmode="decimal" placeholder="0.00" step="0.01" min="0">
    <button id="btnSiguiente" class="btn-primary" disabled>Siguiente →</button>
  </div>

  <div id="panelCategoria" class="panel">
    <button id="backBtn">←</button>
    <div class="label">CATEGORÍA</div>
    <div class="cat-grid">
      <button class="cat-btn" data-cat="Comida">🍽️ Comida</button>
      <button class="cat-btn" data-cat="Transporte">🚕 Transporte</button>
      <button class="cat-btn" data-cat="Ocio">🎮 Ocio</button>
      <button class="cat-btn" data-cat="Cuates">👥 Cuates</button>
      <button class="cat-btn" data-cat="Otros">📦 Otros</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
  // ⚠️ PEGA AQUÍ TU URL DE APPS SCRIPT (la que copiaste al "Implementar")
  const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyv6CjQVwls4MiwFtBIe3OD8M2khEovVkxJ4HrDzwapZHTXccUkUeZPBWO0YGsUMgSVMg/exec";

  const app = document.getElementById("app");
  const montoInput = document.getElementById("montoInput");
  const btnSiguiente = document.getElementById("btnSiguiente");
  const backBtn = document.getElementById("backBtn");
  const toast = document.getElementById("toast");
  const catButtons = document.querySelectorAll(".cat-btn");

  montoInput.addEventListener("input", () => {
    const val = parseFloat(montoInput.value);
    btnSiguiente.disabled = !(val > 0);
  });

  btnSiguiente.addEventListener("click", () => {
    app.classList.add("showCategoria");
  });

  backBtn.addEventListener("click", () => {
    app.classList.remove("showCategoria");
  });

  catButtons.forEach(btn => {
    btn.addEventListener("click", async () => {
      const monto = montoInput.value;
      const categoria = btn.dataset.cat;
      await enviarGasto(monto, categoria);
    });
  });

  async function enviarGasto(monto, categoria) {
    try {
      await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" }, // evita preflight CORS con Apps Script
        body: JSON.stringify({ monto, categoria })
      });
      showToast(`✓ S/ ${monto} en ${categoria}`);
    } catch (err) {
      showToast("Error al guardar, revisa tu conexión");
    }
    // reset y volver al panel de monto
    setTimeout(() => {
      app.classList.remove("showCategoria");
      montoInput.value = "";
      btnSiguiente.disabled = true;
    }, 400);
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
  }
</script>

</body>
</html>
