<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Gastos"/>
<link rel="manifest" href="manifest.json"/>
<title>Gastos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--s1:#f5f5f4;--s2:#e7e5e4;
  --tx:#111;--mu:#999;--ac:#2563eb;--ac2:#eff6ff;
  --ok:#16a34a;--er:#dc2626;--r:12px
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0a0a0a;--s1:#1c1c1c;--s2:#2a2a2a;--tx:#f0f0f0;--mu:#666;--ac2:#1e2a40}
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);padding-bottom:calc(2rem + env(safe-area-inset-bottom))}
#app{max-width:480px;margin:0 auto;padding:1.25rem 1rem}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.cfg-btn{background:none;border:1px solid var(--s2);border-radius:8px;padding:5px 11px;font-size:12px;color:var(--mu);cursor:pointer}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--s2)}
.sync-dot.ok{background:var(--ok)}
.sync-dot.err{background:var(--er)}
.sync-dot.spin{background:var(--ac);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.total{text-align:center;margin-bottom:2rem}
.total-num{font-size:52px;font-weight:600;letter-spacing:-2px;line-height:1}
.total-sub{font-size:13px;color:var(--mu);margin-top:5px}

.box{background:var(--s1);border-radius:var(--r);padding:1rem;margin-bottom:1.75rem}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;background:var(--bg);border:1px solid var(--s2);border-radius:8px;padding:10px 13px;font-size:15px;color:var(--tx);outline:none}
.input-row input:focus{border-color:var(--ac)}
.input-row input::placeholder{color:var(--mu)}
.send-btn{width:42px;height:42px;flex-shrink:0;border:none;border-radius:8px;background:var(--ac);color:#fff;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.send-btn:active{opacity:.8}

.sub-row{display:flex;justify-content:space-between;align-items:center;margin-top:9px;padding:0 2px}
.mic-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mu);background:none;border:none;cursor:pointer;padding:4px 0}
.mic-btn.on{color:var(--er)}
.mic-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.mic-btn.on .mic-dot{animation:pulse 1s infinite}
.hint{font-size:12px;color:var(--mu)}

.ai-row{display:none;justify-content:center;font-size:13px;color:var(--ac);margin-top:9px}

/* panel config */
.cfg-panel{background:var(--s1);border-radius:var(--r);padding:1rem;margin-bottom:1.5rem;display:none}
.cfg-panel.open{display:block}
.cfg-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;font-weight:500}
.cfg-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--mu);line-height:1}
.cfg-panel input{width:100%;background:var(--bg);border:1px solid var(--s2);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--tx);margin-bottom:8px;outline:none}
.cfg-panel input::placeholder{color:var(--mu)}
.cfg-save{width:100%;padding:9px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.cfg-note{font-size:11px;color:var(--mu);margin-top:8px;line-height:1.5}
.cfg-note a{color:var(--ac)}

/* historial por días */
.day-group{margin-bottom:1.5rem}
.day-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.day-label span{font-size:13px;font-weight:500;color:var(--tx)}
.day-label em{font-size:12px;color:var(--mu);font-style:normal}

.item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--s2)}
.item:last-child{border:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.item-body{flex:1;min-width:0}
.item-desc{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:11px;color:var(--mu);margin-top:2px}
.item-amount{font-size:15px;font-weight:500;flex-shrink:0}
.item-del{background:none;border:none;cursor:pointer;color:var(--mu);padding:4px;font-size:16px;line-height:1;opacity:0;transition:opacity .15s}
.item:hover .item-del,.item:active .item-del{opacity:1}

.empty{text-align:center;color:var(--mu);font-size:14px;padding:2.5rem 0}

.toast{position:fixed;bottom:calc(1.25rem + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:8px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:99;max-width:88vw;text-align:center}
.toast.show{opacity:1}

.c-comida{background:#f59e0b}
.c-transporte{background:#3b82f6}
.c-compras{background:#22c55e}
.c-salud{background:#ef4444}
.c-servicios{background:#8b5cf6}
.c-otros{background:#9ca3af}
</style>
</head>
<body>
<div id="app">

  <div class="top-bar">
    <button class="cfg-btn" onclick="toggleCfg()">⚙ sheets</button>
    <div class="sync-dot" id="sync-dot" title="estado de sincronización"></div>
  </div>

  <div class="cfg-panel" id="cfg-panel">
    <div class="cfg-head">
      <span>Google Sheets</span>
      <button class="cfg-close" onclick="toggleCfg()">×</button>
    </div>
    <input id="cfg-client" placeholder="Client ID (termina en .apps.googleusercontent.com)"/>
    <input id="cfg-sheet" placeholder="ID del Google Sheet (de la URL)"/>
    <input id="cfg-tab" placeholder="Nombre de la pestaña (ej: Gastos)"/>
    <button class="cfg-save" onclick="saveConfig()">conectar con Google</button>
    <p class="cfg-note">
      El Client ID lo obtienes en <a href="https://console.cloud.google.com" target="_blank">Google Cloud Console</a> → Credenciales → OAuth.<br>
      El ID del Sheet está en la URL: docs.google.com/spreadsheets/d/<b>ESTE-PARTE</b>/edit
    </p>
  </div>

  <div class="total">
    <div class="total-num" id="total">S/ 0</div>
    <div class="total-sub" id="total-sub">este mes · 0 gastos</div>
  </div>

  <div class="box">
    <div class="input-row">
      <input id="txt" type="text" placeholder="gaste 5 lucas en una gaseosa..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')enviar()"/>
      <button class="send-btn" onclick="enviar()">↑</button>
    </div>
    <div class="sub-row">
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
        <span class="mic-dot"></span>
        <span id="mic-label">hablar</span>
      </button>
      <span class="hint">dilo como quieras</span>
    </div>
    <div class="ai-row" id="ai-row">interpretando…</div>
  </div>

  <div id="feed"><div class="empty">registra tu primer gasto</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLAUDE = 'https://api.anthropic.com/v1/messages';
const SCOPES  = 'https://www.googleapis.com/auth/spreadsheets';

let cfg    = JSON.parse(localStorage.getItem('gcfg') || '{}');
let gastos = JSON.parse(localStorage.getItem('gastos') || '[]');
let gtoken = null;
let mic    = null;
let grabando = false;

// ── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  loadCfgUI();
  render();

  // retorno de OAuth Google
  const p = new URLSearchParams(location.hash.replace('#',''));
  const at = p.get('access_token');
  if (at) {
    gtoken = at;
    history.replaceState(null,'',location.pathname);
    setSyncOk();
    toast('Google Sheets conectado ✓');
    syncPendientes();
  } else if (cfg.clientId) {
    setSyncErr();
  }
}

// ── CONFIG ───────────────────────────────────────────────────────────────────
function toggleCfg() {
  document.getElementById('cfg-panel').classList.toggle('open');
}
function loadCfgUI() {
  document.getElementById('cfg-client').value = cfg.clientId || '';
  document.getElementById('cfg-sheet').value  = cfg.sheetId  || '';
  document.getElementById('cfg-tab').value    = cfg.tab      || 'Gastos';
}
function saveConfig() {
  cfg = {
    clientId: document.getElementById('cfg-client').value.trim(),
    sheetId:  document.getElementById('cfg-sheet').value.trim(),
    tab:      document.getElementById('cfg-tab').value.trim() || 'Gastos',
  };
  if (!cfg.clientId || !cfg.sheetId) { toast('faltan datos'); return; }
  localStorage.setItem('gcfg', JSON.stringify(cfg));
  toggleCfg();
  loginGoogle();
}
function loginGoogle() {
  const redirect = location.origin + location.pathname;
  location.href = `https://accounts.google.com/o/oauth2/v2/auth`
    + `?client_id=${encodeURIComponent(cfg.clientId)}`
    + `&redirect_uri=${encodeURIComponent(redirect)}`
    + `&response_type=token`
    + `&scope=${encodeURIComponent(SCOPES)}`
    + `&prompt=consent`;
}

// ── IA ───────────────────────────────────────────────────────────────────────
async function interpretar(texto) {
  const res = await fetch(CLAUDE, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 120,
      messages: [{role:'user', content:
        `Parser de gastos peruano informal. Reglas: "lucas"=soles, "palo"=100 soles, "kilo"=1000 soles, "propina" suma aparte si la menciona. Sin monto claro pon 0. Categorías solo: comida, transporte, compras, salud, servicios, otros.
Texto: "${texto}"
Solo JSON sin markdown: {"desc":"nombre corto","monto":0.0,"cat":"categoria"}`
      }]
    })
  });
  const d = await res.json();
  return JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
}

// ── REGISTRAR ────────────────────────────────────────────────────────────────
async function enviar() {
  const txt = document.getElementById('txt').value.trim();
  if (!txt) return;
  document.getElementById('txt').value = '';
  document.getElementById('ai-row').style.display = 'flex';

  try {
    const p = await interpretar(txt);
    if (!p.monto || p.monto <= 0) {
      toast('no entendí el monto, intenta de nuevo');
      document.getElementById('ai-row').style.display = 'none';
      return;
    }

    const ahora = new Date();
    const g = {
      id:     Date.now(),
      desc:   p.desc,
      monto:  parseFloat(p.monto.toFixed(2)),
      cat:    p.cat || 'otros',
      fecha:  ahora.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'}),
      hora:   ahora.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}),
      ts:     ahora.toISOString(),
      raw:    txt,
      synced: false
    };

    gastos.unshift(g);
    localStorage.setItem('gastos', JSON.stringify(gastos));
    render();
    toast(`S/ ${g.monto.toFixed(2)} · ${g.desc}`);

    if (gtoken) await appendSheet(g);
    else setSyncErr();

  } catch(e) {
    toast('algo falló, guardado local');
  }
  document.getElementById('ai-row').style.display = 'none';
}

// ── GOOGLE SHEETS ────────────────────────────────────────────────────────────
async function appendSheet(g) {
  if (!gtoken || !cfg.sheetId) return;
  setSyncSpin();
  try {
    const range = encodeURIComponent(`${cfg.tab}!A:F`);
    const url   = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/${range}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
    await fetch(url, {
      method: 'POST',
      headers: {Authorization:`Bearer ${gtoken}`,'Content-Type':'application/json'},
      body: JSON.stringify({ values: [[g.fecha, g.hora, g.desc, g.monto, g.cat, g.raw]] })
    });
    g.synced = true;
    localStorage.setItem('gastos', JSON.stringify(gastos));
    setSyncOk();
  } catch(e) {
    setSyncErr();
  }
}

async function syncPendientes() {
  const pending = gastos.filter(g => !g.synced);
  for (const g of pending) await appendSheet(g);
  if (pending.length) toast(`${pending.length} pendientes sincronizados`);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  // stats del mes
  const now = new Date();
  const mes = gastos.filter(g => {
    const d = new Date(g.ts);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  const total = mes.reduce((s,g) => s + g.monto, 0);
  document.getElementById('total').textContent = `S/ ${total.toFixed(2)}`;
  document.getElementById('total-sub').textContent = `este mes · ${mes.length} gasto${mes.length!==1?'s':''}`;

  const feed = document.getElementById('feed');
  if (!gastos.length) {
    feed.innerHTML = '<div class="empty">registra tu primer gasto</div>';
    return;
  }

  // agrupar por día
  const grupos = {};
  gastos.forEach(g => {
    if (!grupos[g.fecha]) grupos[g.fecha] = [];
    grupos[g.fecha].push(g);
  });

  const hoy   = now.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});
  const ayer  = new Date(now - 86400000).toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});

  feed.innerHTML = Object.keys(grupos).slice(0, 15).map(fecha => {
    const items  = grupos[fecha];
    const subtot = items.reduce((s,g) => s + g.monto, 0);
    const label  = fecha === hoy ? 'hoy' : fecha === ayer ? 'ayer' : fecha;

    const rows = items.map(g =>
      `<div class="item">
        <div class="dot c-${g.cat}"></div>
        <div class="item-body">
          <div class="item-desc">${g.desc}</div>
          <div class="item-meta">${g.hora} · ${g.cat}${g.synced ? '' : ' · pendiente'}</div>
        </div>
        <div class="item-amount">S/ ${g.monto.toFixed(2)}</div>
        <button class="item-del" onclick="borrar(${g.id})">×</button>
      </div>`
    ).join('');

    return `<div class="day-group">
      <div class="day-label">
        <span>${label}</span>
        <em>S/ ${subtot.toFixed(2)}</em>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function borrar(id) {
  gastos = gastos.filter(g => g.id !== id);
  localStorage.setItem('gastos', JSON.stringify(gastos));
  render();
}

// ── MIC ──────────────────────────────────────────────────────────────────────
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    toast('usa Chrome para voz'); return;
  }
  if (grabando) { mic && mic.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  mic = new SR();
  mic.lang = 'es-PE';
  mic.interimResults = false;
  mic.onstart  = () => { grabando = true;  document.getElementById('mic-btn').classList.add('on'); document.getElementById('mic-label').textContent = 'escuchando…'; };
  mic.onresult = e  => { document.getElementById('txt').value = e.results[0][0].transcript; enviar(); };
  mic.onend    = () => { grabando = false; document.getElementById('mic-btn').classList.remove('on'); document.getElementById('mic-label').textContent = 'hablar'; };
  mic.onerror  = () => { grabando = false; document.getElementById('mic-btn').classList.remove('on'); document.getElementById('mic-label').textContent = 'hablar'; };
  mic.start();
}

// ── SYNC STATUS ───────────────────────────────────────────────────────────────
function setSyncOk()   { const d = document.getElementById('sync-dot'); d.className='sync-dot ok';   d.title='sincronizado'; }
function setSyncErr()  { const d = document.getElementById('sync-dot'); d.className='sync-dot err';  d.title='sin conectar'; }
function setSyncSpin() { const d = document.getElementById('sync-dot'); d.className='sync-dot spin'; d.title='sincronizando…'; }

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{})</script>
</body>
</html>
